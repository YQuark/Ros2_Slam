slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    debug_logging: false
    throttle_scans: 2
    transform_publish_period: 0.02
    map_update_interval: 0.05
    resolution: 0.10
    max_laser_range: 3.5
    minimum_time_interval: 0.02
    transform_timeout: 0.4
    tf_buffer_duration: 45.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.002
    minimum_travel_heading: 0.002
    scan_buffer_size: 4
    scan_buffer_maximum_scan_distance: 3.5
    link_match_minimum_response_fine: 0.08
    link_scan_maximum_distance: 1.0
    loop_search_maximum_distance: 2.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 8
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.30
    loop_match_minimum_response_fine: 0.40

    correlation_search_space_dimension: 0.25
    correlation_search_space_resolution: 0.02
    correlation_search_space_smear_deviation: 0.08

    loop_search_space_dimension: 6.0
    loop_search_space_resolution: 0.10
    loop_search_space_smear_deviation: 0.05

    distance_variance_penalty: 0.6
    angle_variance_penalty: 1.2
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
