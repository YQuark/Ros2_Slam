bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false
    default_bt_xml_filename: /home/robot/ros2_ws/src/robot_bringup/behavior_trees/mapping_navigate_to_pose.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_rate_controller_bt_node
      - nav2_pipeline_sequence_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.05
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 8.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: false
      xy_goal_tolerance: 0.22
      yaw_goal_tolerance: 6.28

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.12
      max_vel_y: 0.0
      max_vel_theta: 1.20
      min_speed_xy: 0.08
      max_speed_xy: 0.12
      min_speed_theta: 0.80
      acc_lim_x: 0.22
      acc_lim_y: 0.0
      acc_lim_theta: 1.20
      decel_lim_x: -0.30
      decel_lim_y: 0.0
      decel_lim_theta: -1.50
      vx_samples: 10
      vy_samples: 1
      vtheta_samples: 16
      sim_time: 1.6
      linear_granularity: 0.05
      angular_granularity: 0.05
      transform_tolerance: 0.30
      xy_goal_tolerance: 0.22
      trans_stopped_velocity: 0.06
      short_circuit_trajectory_evaluation: true
      stateful: false
      critics:
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 0.14
      PathAlign.scale: 14.0
      PathAlign.forward_point_distance: 0.12
      GoalAlign.scale: 8.0
      GoalAlign.forward_point_distance: 0.12
      PathDist.scale: 22.0
      GoalDist.scale: 18.0
      Oscillation.scale: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 8.0
      publish_frequency: 4.0
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      transform_tolerance: 0.3
      always_send_full_costmap: false
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.40
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.10
          raytrace_max_range: 3.5
          raytrace_min_range: 0.10
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.45

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      robot_radius: 0.22
      track_unknown_space: true
      transform_tolerance: 0.5
      always_send_full_costmap: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.40
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_max_range: 3.5
          obstacle_min_range: 0.10
          raytrace_max_range: 4.0
          raytrace_min_range: 0.10
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.50

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.35
      use_astar: true
      allow_unknown: false

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.3
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: true
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - recoveries_server
      - bt_navigator
      - waypoint_follower
