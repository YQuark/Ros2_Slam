ydlidar_ros2_driver_node:
  ros__parameters:
    port: /dev/ttyUSB0
    frame_id: laser_frame
    ignore_array: ""
    baudrate: 115200
    lidar_type: 1
    device_type: 0
    sample_rate: 4
    abnormal_check_count: 4
    # X2 reports 422..424 points normally; fixed resolution can spam SDK warnings
    # when the real point count slightly exceeds the SDK's fixed bucket.
    fixed_resolution: false
    reversion: false
    inverted: true
    auto_reconnect: true
    isSingleChannel: true
    intensity_bit: 0
    intensity: false
    support_motor_dtr: true
    angle_max: 180.0
    angle_min: -180.0
    range_max: 12.0
    range_min: 0.1
    frequency: 10.0
    invalid_range_is_inf: true
    debug: false
