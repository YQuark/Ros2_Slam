slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 0.15
    resolution: 0.03
    max_laser_range: 8.0
    minimum_time_interval: 0.05
    transform_timeout: 0.35
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.008
    minimum_travel_heading: 0.008
    scan_buffer_size: 15
    scan_buffer_maximum_scan_distance: 7.0
    link_match_minimum_response_fine: 0.12
    link_scan_maximum_distance: 1.8
    loop_search_maximum_distance: 3.5
    do_loop_closing: true
    loop_match_minimum_chain_size: 12
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.40
    loop_match_minimum_response_fine: 0.50

    correlation_search_space_dimension: 0.50
    correlation_search_space_resolution: 0.008
    correlation_search_space_smear_deviation: 0.08

    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.04
    loop_search_space_smear_deviation: 0.04

    distance_variance_penalty: 0.7
    angle_variance_penalty: 1.3
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
